version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: art_postgres
    environment:
      POSTGRES_USER: art_user
      POSTGRES_PASSWORD: art_password
      POSTGRES_DB: art_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U art_user -d art_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: art_backend
    environment:
      DATABASE_URL: postgresql://art_user:art_password@db:5432/art_db
      APP_ENV: development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: art_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  pgdata:
